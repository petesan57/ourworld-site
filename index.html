<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OurWorld — Ideas In Motion</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --bg2: #0f0f1a;
  --bg3: #1a1a2e;
  --accent: #4f46e5;
  --accent2: #818cf8;
  --accent3: #c7d2fe;
  --text: #e0e7ff;
  --muted: #6b7280;
  --border: #2e2e4a;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }

nav {
  position: sticky; top: 0; z-index: 1000;
  background: rgba(8,8,16,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center;
  height: 64px;
  overflow: visible;
}
nav::-webkit-scrollbar { display: none; }

.nav-logo {
  display: flex; align-items: center; gap: 10px;
  margin-right: 28px; text-decoration: none; flex-shrink: 0;
}
.nav-logo svg { width: 36px; height: 36px; flex-shrink: 0; }
.nav-logo-text {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px;
  color: var(--text); white-space: nowrap; line-height: 1;
}
.nav-logo-text span { color: var(--accent2); }

.nav-links { display: flex; gap: 4px; align-items: center; }
.nav-links a { color: var(--muted); font-size: 15px; text-decoration: none; padding: 7px 12px; border-radius: 6px; white-space: nowrap; transition: all 0.15s; }
.nav-links a:hover { color: var(--text); background: var(--bg3); }
.nav-links a.active { color: var(--accent2); }

.nav-dropdown { position: relative; }
.nav-dropdown > .drop-toggle { color: var(--muted); font-size: 15px; text-decoration: none; padding: 7px 12px; border-radius: 6px; white-space: nowrap; transition: all 0.15s; cursor: pointer; display: flex; align-items: center; gap: 4px; background: none; border: none; font-family: inherit; }
.nav-dropdown > .drop-toggle:hover { color: var(--text); background: var(--bg3); }
.nav-dropdown > .drop-toggle.active { color: var(--accent2); }
.nav-dropdown > .drop-toggle::after { content: '▾'; font-size: 10px; }
.drop-menu { display: none; position: absolute; top: calc(100% + 8px); left: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 6px; min-width: 160px; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.nav-dropdown:hover .drop-menu, .nav-dropdown.open .drop-menu { display: block; }
.drop-menu a { display: block; color: var(--muted); font-size: 14px; text-decoration: none; padding: 8px 14px; border-radius: 6px; white-space: nowrap; transition: all 0.15s; }
.drop-menu a:hover { color: var(--text); background: var(--bg3); }
.drop-menu a.active { color: var(--accent2); }

section { display: none; padding: 40px 24px; max-width: 900px; margin: 0 auto; }

.hero { text-align: center; padding: 80px 24px 60px; max-width: 900px; margin: 0 auto; display: none; }
.hero.active { display: block; }
.hero-tag { display: inline-block; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: var(--accent2); padding: 4px 14px; margin-bottom: 24px; }
.hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(36px,7vw,72px); font-weight: 800; line-height: 1.05; margin-bottom: 16px; }
.hero h1 span { color: var(--accent2); }
.hero h2 { font-size: clamp(18px,3vw,26px); font-weight: 400; color: var(--muted); margin-bottom: 32px; }
.hero-desc { font-size: 15px; color: var(--muted); max-width: 500px; margin: 0 auto 40px; line-height: 1.7; }
.hero-badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 48px; }
.badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; font-size: 13px; color: var(--accent3); }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); gap: 16px; margin-top: 48px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }

.section-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 8px; }

.chat-feed { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-top: 24px; }
.chat-feed h4 { font-size: 13px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.chat-msg { display: flex; gap: 8px; margin-bottom: 12px; align-items: flex-start; }

.chat-msg .body { font-size: 13px; color: var(--muted); line-height: 1.5; }

.biz-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 14px; }

.news-feature { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
.news-feature .news-badge { display: inline-block; background: rgba(239,68,68,0.15); color: var(--red); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }

.news-small { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }

.studio-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
.studio-type { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent2); margin-bottom: 6px; }
.studio-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.studio-card .by { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
.studio-meta { display: flex; justify-content: space-between; align-items: center; }
.likes { font-size: 12px; color: var(--muted); }
.price { font-size: 13px; font-weight: 600; color: var(--accent2); }
